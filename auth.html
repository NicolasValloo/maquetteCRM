<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM SaaS — Authentification</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    /* ============================================================
       AUTH — Standalone page (no sidebar, BEM strict)
       ============================================================ */

    .auth { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%); padding: var(--sp-4); }
    .auth__container { width: 100%; max-width: 420px; }

    /* Card */
    .auth__card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden; }
    .auth__header { display: flex; flex-direction: column; align-items: center; padding: var(--sp-8) var(--sp-6) var(--sp-6); border-bottom: 1px solid var(--border-subtle); }
    .auth__logo { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--accent-600); border-radius: var(--radius-lg); color: white; margin-bottom: var(--sp-3); }
    .auth__logo svg { width: 24px; height: 24px; }
    .auth__title { font-size: var(--text-xl); font-weight: 700; letter-spacing: var(--tracking-tight); margin-bottom: var(--sp-1); }
    .auth__desc { font-size: var(--text-sm); color: var(--text-muted); text-align: center; }

    /* Form */
    .auth__body { padding: var(--sp-6); }
    .auth__form-row { margin-bottom: var(--sp-4); }
    .auth__form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: var(--sp-1); }
    .auth__form-input { width: 100%; }
    .auth__form-hint { font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--sp-1); }

    /* Password strength */
    .auth__password-strength { display: flex; gap: 2px; margin-top: var(--sp-2); }
    .auth__strength-bar { height: 3px; flex: 1; background: var(--border-subtle); border-radius: 2px; }
    .auth__strength-bar--weak { background: var(--color-danger); }
    .auth__strength-bar--medium { background: var(--color-warning); }
    .auth__strength-bar--strong { background: var(--color-success); }
    .auth__strength-text { font-size: var(--text-xs); color: var(--text-muted); margin-top: 4px; }

    /* MFA step layout */
    .auth__step { display: none; }
    .auth__step--active { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* MFA digit inputs */
    .auth__mfa-inputs { display: flex; gap: var(--sp-2); justify-content: center; margin: var(--sp-4) 0; }
    .auth__mfa-digit { width: 50px; height: 50px; font-size: var(--text-lg); font-weight: 600; text-align: center; border: 1px solid var(--border-default); border-radius: var(--radius-md); }
    .auth__mfa-digit:focus { border-color: var(--accent-600); box-shadow: 0 0 0 2px rgba(37, 99, 235, .1); }

    /* Buttons */
    .auth__submit { width: 100%; }
    .auth__footer { padding: 0 var(--sp-6) var(--sp-6); display: flex; align-items: center; justify-content: center; gap: var(--sp-1); font-size: var(--text-sm); color: var(--text-muted); }
    .auth__link { color: var(--accent-600); text-decoration: none; font-weight: 500; cursor: pointer; }
    .auth__link:hover { text-decoration: underline; }

    /* Error & success messages */
    .auth__message { padding: var(--sp-3) var(--sp-3); border-radius: var(--radius-md); font-size: var(--text-sm); margin-bottom: var(--sp-4); display: none; }
    .auth__message--error { display: block; background: var(--color-danger-subtle); color: var(--color-danger); border: 1px solid rgba(239, 68, 68, .2); }
    .auth__message--success { display: block; background: var(--color-success-subtle); color: var(--color-success); border: 1px solid rgba(34, 197, 94, .2); }

    /* Step indicator */
    .auth__steps-indicator { display: flex; gap: var(--sp-2); justify-content: center; margin-bottom: var(--sp-6); }
    .auth__step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-default); }
    .auth__step-dot--active { background: var(--accent-600); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Aller au contenu</a>

  <div class="auth" id="main-content">
    <div class="auth__container">

      <!-- ============================================================
           LOGIN STEP
           ============================================================ -->
      <div class="auth__step auth__step--active" id="step-login">
        <div class="auth__card">
          <div class="auth__header">
            <div class="auth__logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><circle cx="17.5" cy="17.5" r="3.5"/></svg>
            </div>
            <h1 class="auth__title">CRM SaaS</h1>
            <p class="auth__desc">Connectez-vous à votre compte</p>
          </div>

          <div class="auth__body">
            <div id="loginErrorMsg" class="auth__message auth__message--error"></div>

            <form id="loginForm" hx-post="/api/auth/login/" hx-target="#loginForm" hx-swap="outerHTML" hx-indicator="#loginSpinner">

              <!-- Email field -->
              <div class="auth__form-row">
                <label class="auth__form-label" for="email">Email</label>
                <input class="input auth__form-input" type="email" id="email" name="email" placeholder="vous@exemple.fr" required autocomplete="email">
              </div>

              <!-- Password field -->
              <div class="auth__form-row">
                <label class="auth__form-label" for="password">Mot de passe</label>
                <input class="input auth__form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
              </div>

              <!-- Remember me -->
              <div class="auth__form-row" style="margin-bottom:var(--sp-3)">
                <label style="display:flex;align-items:center;gap:var(--sp-2);font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer" for="rememberMe">
                  <input type="checkbox" id="rememberMe" name="rememberMe" style="width:16px;height:16px;accent-color:var(--accent-600)">
                  <span>Se souvenir de moi</span>
                </label>
              </div>

              <!-- Submit button -->
              <button type="submit" class="btn btn-primary auth__submit">
                <span id="loginBtnText">Se connecter</span>
              </button>

              <!-- Loading indicator -->
              <div id="loginSpinner" class="htmx-indicator" style="display:none;margin-top:var(--sp-2);text-align:center;font-size:var(--text-sm);color:var(--text-muted)">
                Connexion en cours…
              </div>

            </form>

            <!-- Forgot password link -->
            <div style="text-align:center;margin-top:var(--sp-4)">
              <a href="#" class="auth__link" onclick="showResetStep(event)">Mot de passe oublié ?</a>
            </div>
          </div>
        </div>
      </div>

      <!-- ============================================================
           MFA STEP
           ============================================================ -->
      <div class="auth__step" id="step-mfa">
        <div class="auth__card">
          <div class="auth__header">
            <div class="auth__logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            </div>
            <h1 class="auth__title">Vérification 2FA</h1>
            <p class="auth__desc">Entrez le code de votre application authenticatrice</p>
          </div>

          <div class="auth__body">
            <div id="mfaErrorMsg" class="auth__message auth__message--error"></div>

            <form id="mfaForm" hx-post="/api/auth/mfa/verify/" hx-target="this" hx-indicator="#mfaSpinner">

              <!-- MFA digit inputs -->
              <div class="auth__mfa-inputs">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa1" tabindex="0" aria-label="Chiffre 1 du code d'authentification">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa2" tabindex="0" aria-label="Chiffre 2 du code d'authentification">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa3" tabindex="0" aria-label="Chiffre 3 du code d'authentification">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa4" tabindex="0" aria-label="Chiffre 4 du code d'authentification">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa5" tabindex="0" aria-label="Chiffre 5 du code d'authentification">
                <input class="input auth__mfa-digit" type="text" maxlength="1" inputmode="numeric" id="mfa6" tabindex="0" aria-label="Chiffre 6 du code d'authentification">
              </div>

              <!-- Collect the full code -->
              <input type="hidden" name="mfaCode" id="mfaCode">

              <!-- Submit button -->
              <button type="submit" class="btn btn-primary auth__submit">
                Vérifier
              </button>

              <!-- Loading indicator -->
              <div id="mfaSpinner" class="htmx-indicator" style="display:none;margin-top:var(--sp-2);text-align:center;font-size:var(--text-sm);color:var(--text-muted)">
                Vérification en cours…
              </div>

            </form>

            <!-- Back link -->
            <div style="text-align:center;margin-top:var(--sp-4)">
              <a href="#" class="auth__link" onclick="showLoginStep(event)">Retour</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ============================================================
       JAVASCRIPT
       ============================================================ -->
  <script>
    /* -----------------------------------------------------------
       Step management
       ----------------------------------------------------------- */
    function showLoginStep(e) {
      e.preventDefault();
      document.getElementById('step-login').classList.add('auth__step--active');
      document.getElementById('step-mfa').classList.remove('auth__step--active');
    }

    function showMfaStep(e) {
      e.preventDefault();
      document.getElementById('step-login').classList.remove('auth__step--active');
      document.getElementById('step-mfa').classList.add('auth__step--active');
      document.getElementById('mfa1').focus();
    }

    function showResetStep(e) {
      e.preventDefault();
      alert('Mot de passe oublié — fonctionnalité en construction');
    }

    /* -----------------------------------------------------------
       MFA digit inputs: auto-focus to next
       ----------------------------------------------------------- */
    ['mfa1', 'mfa2', 'mfa3', 'mfa4', 'mfa5', 'mfa6'].forEach((id, i) => {
      const input = document.getElementById(id);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '') {
          const prev = document.getElementById(['mfa1', 'mfa2', 'mfa3', 'mfa4', 'mfa5', 'mfa6'][i - 1]);
          if (prev) prev.focus();
        }
      });
      input.addEventListener('input', (e) => {
        if (input.value && input.value.match(/^\d$/)) {
          if (i < 5) {
            document.getElementById(['mfa1', 'mfa2', 'mfa3', 'mfa4', 'mfa5', 'mfa6'][i + 1]).focus();
          }
          // Update hidden input with full code
          const code = ['mfa1', 'mfa2', 'mfa3', 'mfa4', 'mfa5', 'mfa6']
            .map(id => document.getElementById(id).value)
            .join('');
          document.getElementById('mfaCode').value = code;
        }
      });
    });

    /* -----------------------------------------------------------
       Form submission: show MFA step on successful login
       ----------------------------------------------------------- */
    document.getElementById('loginForm').addEventListener('htmx:responseError', (e) => {
      const errorMsg = document.getElementById('loginErrorMsg');
      errorMsg.textContent = 'Identifiants invalides';
      errorMsg.style.display = 'block';
    });

    // On successful login, show MFA step
    document.addEventListener('htmx:afterSwap', (e) => {
      if (e.detail.xhr.status === 200 && e.target.id === 'loginForm') {
        showMfaStep({ preventDefault: () => {} });
      }
    });

    /* -----------------------------------------------------------
       Password strength indicator (example, not used in demo but included for completeness)
       ----------------------------------------------------------- */
    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;
      return strength;
    }
  </script>

</body>
</html>
